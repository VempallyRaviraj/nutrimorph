<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Plan - NutriMorph</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/dashboard.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="dashboard-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>NutriMorph</h2>
        </div>
        <nav class="sidebar-nav">
          <a href="/pages/dashboard.html" class="nav-item">Dashboard</a>
          <a href="/pages/mealplan.html" class="nav-item active">Meal Plans</a>
          <a href="/pages/progress.html" class="nav-item">Progress</a>
          <a href="/pages/profile.html" class="nav-item">Profile</a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="top-bar">
          <div class="top-bar-left">
            <h1>AI Meal Plan</h1>
            <p>Generate and save a personalized daily meal plan</p>
          </div>
        </header>

        <div class="dashboard-content">
          <div class="dashboard-grid">
            <!-- GENERATOR -->
            <div class="card">
              <div class="card-header">
                <h3>Generate Meal Plan</h3>
              </div>

              <form id="mealPlanForm" class="profile-form">
                <div class="form-group">
                  <label>Goal (optional)</label>
                  <select id="goal">
                    <option value="">Use profile goal</option>
                    <option value="weight_loss">Weight Loss</option>
                    <option value="muscle_gain">Muscle Gain</option>
                    <option value="maintenance">Maintain Weight</option>
                    <option value="health_optimization">
                      Health Optimization
                    </option>
                  </select>
                </div>

                <div class="form-group">
                  <label>Calories Target (optional)</label>
                  <input type="number" id="caloriesTarget" />
                </div>

                <div class="form-group">
                  <label>Meals Per Day</label>
                  <select id="mealsPerDay">
                    <option value="3">3 meals</option>
                    <option value="4">4 meals</option>
                    <option value="5">5 meals</option>
                  </select>
                </div>

                <button type="submit" class="btn-primary">Generate Plan</button>
              </form>
            </div>

            <!-- PLAN DISPLAY -->
            <div class="card">
              <div class="card-header">
                <h3>Generated Meal Plan</h3>
              </div>

              <div id="planContainer">
                <p style="color: #6b7280">No plan generated yet.</p>
              </div>

              <button
                id="savePlanBtn"
                class="btn-primary"
                style="margin-top: 15px; display: none"
              >
                Save Plan
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      let lastGeneratedPlan = null;

      // Render plan
      function renderPlan(planObj) {
        const container = document.getElementById("planContainer");

        if (!planObj) {
          container.innerHTML = `<p style='color:#6b7280'>No plan generated.</p>`;
          return;
        }

        lastGeneratedPlan = planObj;

        let html = `
        <p>${planObj.daySummary || ""}</p>
        <p><strong>Total Calories:</strong> ${planObj.totalCalories || "?"}</p>
        <p><strong>Macros:</strong> Protein ${
          planObj.macros.protein
        }g • Carbs ${planObj.macros.carbs}g • Fat ${planObj.macros.fat}g</p>
        <div class='meals-list'>
    `;

        planObj.meals.forEach((m) => {
          html += `
            <div class="meal-item">
                <div class="meal-details">
                    <h4>${m.timeOfDay} – ${m.title}</h4>
                    <p>${m.description}</p>
                    <span class="calories">${m.calories} kcal</span>
                </div>
            </div>
        `;
        });

        html += `</div>`;
        container.innerHTML = html;

        // show save button
        document.getElementById("savePlanBtn").style.display = "block";
      }

      // Generate plan
      async function generatePlan(e) {
        e.preventDefault();

        const payload = {
          goal: document.getElementById("goal").value || null,
          caloriesTarget:
            parseInt(document.getElementById("caloriesTarget").value) || null,
          mealsPerDay: parseInt(document.getElementById("mealsPerDay").value),
        };

        const btn = e.target.querySelector("button");
        btn.textContent = "Generating...";
        btn.disabled = true;

        try {
          const res = await fetch("/api/mealplan/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(payload),
          });

          const result = await res.json();

          if (!result.success) {
            alert(result.message);
            return;
          }

          renderPlan(result.data);
        } finally {
          btn.textContent = "Generate Plan";
          btn.disabled = false;
        }
      }

      // Save plan to DB
      document
        .getElementById("savePlanBtn")
        .addEventListener("click", async () => {
          if (!lastGeneratedPlan) return alert("Generate a plan first");

          const res = await fetch("/api/mealplan/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ plan: lastGeneratedPlan }),
          });

          const result = await res.json();
          alert(result.message || "Saved!");
        });

      // Attach
      document
        .getElementById("mealPlanForm")
        .addEventListener("submit", generatePlan);
    </script>
  </body>
</html>
