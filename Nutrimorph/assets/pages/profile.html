<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - NutriMorph</title>

    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/dashboard.css" />
    <link rel="stylesheet" href="/assets/css/profile.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="dashboard-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>NutriMorph</h2>
        </div>
        <nav class="sidebar-nav">
          <a href="/pages/dashboard.html" class="nav-item">Dashboard</a>
          <a href="/pages/mealplan.html" class="nav-item">Meal Plans</a>
          <a href="/pages/progress.html" class="nav-item">Progress</a>
          <a href="/pages/profile.html" class="nav-item active">Profile</a>
        </nav>
      </aside>

      <!-- Main -->
      <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
          <div class="top-bar-left">
            <h1>Profile</h1>
            <p>Your personal and health information</p>
          </div>
          <div class="top-bar-right">
            <div class="user-menu">
              <i
                class="fa-solid fa-circle-user"
                style="font-size: 28px; color: #4b5563"
              ></i>
              <span id="userName">Loading...</span>
            </div>
          </div>
        </header>

        <!-- Profile Content -->
        <div class="profile-content">
          <div class="profile-grid">
            <!-- PERSONAL INFO -->
            <div class="card">
              <div class="card-header">
                <h3>Personal Information</h3>
                <button class="btn-secondary small" id="editPersonalBtn">
                  Edit
                </button>
              </div>

              <form id="personalForm" class="profile-form">
                <div class="form-row">
                  <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" disabled />
                  </div>
                  <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" disabled />
                  </div>
                </div>

                <div class="form-group">
                  <label>Email</label>
                  <input type="email" id="email" disabled />
                </div>

                <div id="personalActions" class="form-actions hidden">
                  <button
                    type="button"
                    class="btn-secondary"
                    id="cancelPersonalBtn"
                  >
                    Cancel
                  </button>
                  <button type="submit" class="btn-primary">Save</button>
                </div>
              </form>
            </div>

            <!-- HEALTH INFO -->
            <div class="card">
              <div class="card-header">
                <h3>Health Information</h3>
                <button class="btn-secondary small" id="editHealthBtn">
                  Edit
                </button>
              </div>

              <form id="healthForm" class="profile-form">
                <div class="form-row">
                  <div class="form-group">
                    <label>Height (cm)</label>
                    <input type="number" id="heightCm" disabled />
                  </div>
                  <div class="form-group">
                    <label>Current Weight (kg)</label>
                    <input type="number" id="currentWeightKg" disabled />
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label>Target Weight (kg)</label>
                    <input type="number" id="targetWeightKg" disabled />
                  </div>
                </div>

                <div class="form-group">
                  <label>Medical Conditions</label>
                  <textarea id="medicalConditions" rows="3" disabled></textarea>
                </div>

                <div class="form-actions hidden" id="healthActions">
                  <button
                    type="button"
                    class="btn-secondary"
                    id="cancelHealthBtn"
                  >
                    Cancel
                  </button>
                  <button type="submit" class="btn-primary">Save</button>
                </div>
              </form>
            </div>

            <!-- GOALS -->
            <div class="card">
              <div class="card-header">
                <h3>Goals</h3>
                <button class="btn-secondary small" id="editGoalsBtn">
                  Edit
                </button>
              </div>

              <form id="goalsForm" class="profile-form">
                <div class="form-group">
                  <label>Primary Goal</label>
                  <select id="primaryGoal" disabled>
                    <option value="weight_loss">Weight Loss</option>
                    <option value="muscle_gain">Muscle Building</option>
                    <option value="maintenance">Maintain Weight</option>
                    <option value="health_optimization">
                      Health Optimization
                    </option>
                  </select>
                </div>

                <div class="form-actions hidden" id="goalsActions">
                  <button
                    type="button"
                    class="btn-secondary"
                    id="cancelGoalsBtn"
                  >
                    Cancel
                  </button>
                  <button type="submit" class="btn-primary">Save</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      async function loadProfile() {
        const res = await fetch("/api/profile", { credentials: "include" });
        const result = await res.json();

        if (!result.success) return;

        const d = result.data;
        const p = d.profile;

        // Sidebar user
        document.getElementById(
          "userName"
        ).textContent = `${d.firstName} ${d.lastName}`;

        // Personal info
        firstName.value = d.firstName;
        lastName.value = d.lastName;
        email.value = d.email;

        // Health info
        heightCm.value = p.heightCm || "";
        currentWeightKg.value = p.currentWeightKg || "";
        targetWeightKg.value = p.targetWeightKg || "";
        medicalConditions.value = p.medicalConditions || "";

        // Goal
        primaryGoal.value = d.goal || "maintenance";
      }

      loadProfile();

      // --- Editing Logic ---
      function enableFields(formId, actionId) {
        document
          .querySelectorAll(
            `#${formId} input, #${formId} textarea, #${formId} select`
          )
          .forEach((i) => (i.disabled = false));
        document.getElementById(actionId).classList.remove("hidden");
      }

      function disableFields(formId, actionId) {
        document
          .querySelectorAll(
            `#${formId} input, #${formId} textarea, #${formId} select`
          )
          .forEach((i) => (i.disabled = true));
        document.getElementById(actionId).classList.add("hidden");
      }

      editPersonalBtn.onclick = () =>
        enableFields("personalForm", "personalActions");
      cancelPersonalBtn.onclick = () => {
        disableFields("personalForm", "personalActions");
        loadProfile();
      };

      editHealthBtn.onclick = () => enableFields("healthForm", "healthActions");
      cancelHealthBtn.onclick = () => {
        disableFields("healthForm", "healthActions");
        loadProfile();
      };

      editGoalsBtn.onclick = () => enableFields("goalsForm", "goalsActions");
      cancelGoalsBtn.onclick = () => {
        disableFields("goalsForm", "goalsActions");
        loadProfile();
      };

      // --- Save Handlers ---
      personalForm.onsubmit = async (e) => {
        e.preventDefault();
        await updateProfile();
        disableFields("personalForm", "personalActions");
      };

      healthForm.onsubmit = async (e) => {
        e.preventDefault();
        await updateProfile();
        disableFields("healthForm", "healthActions");
      };

      goalsForm.onsubmit = async (e) => {
        e.preventDefault();
        await updateProfile();
        disableFields("goalsForm", "goalsActions");
      };

      async function updateProfile() {
        const payload = {
          firstName: firstName.value,
          lastName: lastName.value,
          goal: primaryGoal.value,
          profile: {
            heightCm: heightCm.value,
            currentWeightKg: currentWeightKg.value,
            targetWeightKg: targetWeightKg.value,
            medicalConditions: medicalConditions.value,
          },
        };

        await fetch("/api/profile", {
          method: "PUT",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
      }
    </script>
  </body>
</html>
