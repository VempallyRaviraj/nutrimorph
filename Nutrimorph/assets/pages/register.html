<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - NutriMorph</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* (shortened: this is basically the register page you posted earlier) */
      :root {
        --primary-color: #10b981;
        --secondary-color: #059669;
        --danger-color: #ef4444;
        --text-dark: #1f2937;
        --text-light: #6b7280;
        --bg-light: #f9fafb;
        --bg-white: #ffffff;
        --border-color: #e5e7eb;
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        --transition: all 0.3s ease;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-white);
        color: var(--text-dark);
      }
      .auth-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 100vh;
      }
      .auth-form-section {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 2rem 1rem;
        background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
        overflow-y: auto;
      }
      .auth-card {
        width: 100%;
        max-width: 500px;
        background: var(--bg-white);
        border-radius: 12px;
        padding: 2rem;
        box-shadow: var(--shadow-lg);
        margin: 2rem auto;
      }
      .auth-header {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .auth-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
      }
      .auth-header p {
        font-size: 0.875rem;
        color: var(--text-light);
      }
      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .form-group label {
        font-size: 0.875rem;
        font-weight: 600;
      }
      .form-group input,
      .form-group select {
        padding: 0.75rem 1rem;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        font-size: 0.9375rem;
        transition: var(--transition);
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
      }
      .checkbox-label {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        cursor: pointer;
        font-size: 0.875rem;
      }
      .checkbox-label input {
        display: none;
      }
      .checkmark {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        border: 2px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 2px;
      }
      .checkbox-label input:checked + .checkmark {
        background: var(--primary-color);
        border-color: var(--primary-color);
      }
      .checkmark::after {
        content: "✓";
        color: #fff;
        font-size: 0.75rem;
        opacity: 0;
      }
      .checkbox-label input:checked + .checkmark::after {
        opacity: 1;
      }
      .btn {
        padding: 0.875rem 1.5rem;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.9375rem;
        transition: var(--transition);
      }
      .btn-primary {
        background: var(--primary-color);
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        background: var(--secondary-color);
        transform: translateY(-2px);
      }
      .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: var(--text-light);
      }
      .link {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
      }
      .error-message {
        color: var(--danger-color);
        font-size: 0.8125rem;
      }
      .success-notification,
      .error-notification {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 1rem 1.5rem;
        border-radius: 8px;
        color: white;
        z-index: 1000;
      }
      .success-notification {
        background: #10b981;
      }
      .error-notification {
        background: #ef4444;
      }
      .auth-image-section {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .auth-image {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .auth-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .auth-image-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(16, 185, 129, 0.8),
          rgba(5, 150, 105, 0.8)
        );
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
        padding: 2rem;
      }
      @media (max-width: 768px) {
        .auth-container {
          grid-template-columns: 1fr;
        }
        .auth-image-section {
          display: none;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <!-- Register Form Section -->
      <div class="auth-form-section">
        <div class="auth-card">
          <div class="auth-header">
            <h1>Create Your Account</h1>
            <p>Start your personalized nutrition journey today</p>
          </div>

          <form class="auth-form" id="registerForm">
            <div class="form-row">
              <div class="form-group">
                <label for="firstName">First Name</label>
                <input
                  type="text"
                  id="firstName"
                  name="firstName"
                  placeholder="John"
                  required
                />
              </div>
              <div class="form-group">
                <label for="lastName">Last Name</label>
                <input
                  type="text"
                  id="lastName"
                  name="lastName"
                  placeholder="Doe"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="age">Age</label>
                <input
                  type="number"
                  id="age"
                  name="age"
                  min="13"
                  max="100"
                  placeholder="25"
                  required
                />
              </div>
              <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                  <option value="">Select Gender</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="goal">Primary Goal</label>
              <select id="goal" name="goal" required>
                <option value="">Select Your Goal</option>
                <option value="weight_loss">Weight Loss</option>
                <option value="muscle_gain">Muscle Building</option>
                <option value="maintenance">Maintain Current Weight</option>
                <option value="health_optimization">Health Optimization</option>
              </select>
            </div>

            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="terms" />
                <span class="checkmark"></span>
                <span
                  >I agree to the
                  <a href="#" class="link">Terms of Service</a> and
                  <a href="#" class="link">Privacy Policy</a></span
                >
              </label>
            </div>

            <button type="submit" class="btn btn-primary">
              Create Account
            </button>
          </form>

          <div class="auth-footer">
            <p>
              Already have an account?
              <a href="/login" class="link">Sign In</a>
            </p>
          </div>
        </div>
      </div>

      <!-- Image Section -->
      <div class="auth-image-section">
        <div class="auth-image">
          <img
            src="https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg?auto=compress&cs=tinysrgb&w=800"
            alt="Healthy lifestyle"
          />
          <div class="auth-image-overlay">
            <h2>Join 10,000+ Users</h2>
            <p>
              Who have transformed their nutrition with AI-powered personalized
              plans
            </p>
          </div>
        </div>
      </div>
    </div>

    <script>
      class RegisterManager {
        constructor() {
          this.form = document.getElementById("registerForm");
          this.firstNameInput = document.getElementById("firstName");
          this.lastNameInput = document.getElementById("lastName");
          this.emailInput = document.getElementById("email");
          this.passwordInput = document.getElementById("password");
          this.confirmPasswordInput =
            document.getElementById("confirmPassword");
          this.ageInput = document.getElementById("age");
          this.genderSelect = document.getElementById("gender");
          this.goalSelect = document.getElementById("goal");
          this.termsCheckbox = document.getElementById("terms");
          this.init();
        }

        init() {
          this.form.addEventListener("submit", (e) => this.handleRegister(e));
        }

        showError(input, message) {
          const group = input.closest(".form-group");
          const existing = group.querySelector(".error-message");
          if (existing) existing.remove();
          input.style.borderColor = "#ef4444";
          input.style.boxShadow = "0 0 0 3px rgba(239,68,68,0.1)";
          const p = document.createElement("p");
          p.className = "error-message";
          p.textContent = message;
          group.appendChild(p);
        }

        clearError(input) {
          const group = input.closest(".form-group");
          const existing = group.querySelector(".error-message");
          if (existing) existing.remove();
          input.style.borderColor = "";
          input.style.boxShadow = "";
        }

        showNotification(message, type = "success") {
          const div = document.createElement("div");
          div.className =
            type === "success" ? "success-notification" : "error-notification";
          div.textContent = message;
          document.body.appendChild(div);
          setTimeout(() => div.remove(), 3000);
        }

        validate() {
          let ok = true;

          const fn = this.firstNameInput.value.trim();
          if (!fn || fn.length < 2) {
            this.showError(
              this.firstNameInput,
              "First name must be at least 2 characters"
            );
            ok = false;
          } else this.clearError(this.firstNameInput);

          const ln = this.lastNameInput.value.trim();
          if (!ln || ln.length < 2) {
            this.showError(
              this.lastNameInput,
              "Last name must be at least 2 characters"
            );
            ok = false;
          } else this.clearError(this.lastNameInput);

          const email = this.emailInput.value.trim();
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(email)) {
            this.showError(this.emailInput, "Enter a valid email");
            ok = false;
          } else this.clearError(this.emailInput);

          const pwd = this.passwordInput.value;
          if (!pwd || pwd.length < 8) {
            this.showError(
              this.passwordInput,
              "Password must be at least 8 characters"
            );
            ok = false;
          } else this.clearError(this.passwordInput);

          const cpwd = this.confirmPasswordInput.value;
          if (cpwd !== pwd) {
            this.showError(this.confirmPasswordInput, "Passwords do not match");
            ok = false;
          } else this.clearError(this.confirmPasswordInput);

          const age = parseInt(this.ageInput.value, 10);
          if (!age || age < 13 || age > 120) {
            this.showError(this.ageInput, "Enter a valid age");
            ok = false;
          } else this.clearError(this.ageInput);

          if (!this.genderSelect.value) ok = false;
          if (!this.goalSelect.value) ok = false;

          if (!this.termsCheckbox.checked) {
            this.showNotification(
              "Please accept the Terms of Service and Privacy Policy",
              "error"
            );
            ok = false;
          }

          return ok;
        }

        async handleRegister(e) {
          e.preventDefault();
          if (!this.validate()) return;

          const formData = {
            firstName: this.firstNameInput.value.trim(),
            lastName: this.lastNameInput.value.trim(),
            email: this.emailInput.value.trim(),
            password: this.passwordInput.value,
            age: parseInt(this.ageInput.value, 10),
            gender: this.genderSelect.value,
            goal: this.goalSelect.value,
          };

          const btn = this.form.querySelector('button[type="submit"]');
          const original = btn.textContent;
          btn.disabled = true;
          btn.textContent = "Creating Account...";

          try {
            const res = await fetch("/api/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(formData),
            });

            const result = await res.json();
            if (res.ok && result.success) {
              this.showNotification(
                result.message || "Account created successfully!"
              );
              setTimeout(() => (window.location.href = "/login"), 1000);
            } else {
              this.showNotification(
                result.message || "Registration failed",
                "error"
              );
            }
          } catch (err) {
            this.showNotification(
              "Server error, please try again later",
              "error"
            );
          } finally {
            btn.disabled = false;
            btn.textContent = original;
          }
        }
      }

      document.addEventListener(
        "DOMContentLoaded",
        () => new RegisterManager()
      );
    </script>
  </body>
</html>
